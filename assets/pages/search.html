<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="m-0 font-[Poppins] text-[#211f1f]">

    <!-- Header simple -->
    <header>
        <nav class="row justify-between items-center p-7">
            <div class="row justify-between items-center gap-20">
                <a href="../../index.html">
                    <img src="../images/home-images/Ceramics01.png" alt="logo">
                </a>

                <div class="row justify-between gap-15 items-center hidden lg:flex">
                    <a href="../../index.html" class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Home</a>
                    <a href="./about.html" class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">About Us</a>
                    <a href="./ourStores.html" class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Our Stores</a>
                    <a href="./shop.html" class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Shop</a>
                    <a href="./blog.html" class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Blog</a>
                </div>
            </div>

            <div class="row justify-between gap-5 items-center">
                <div class="relative group hidden md:block">
                    <div class="cursor-pointer flex items-center gap-1">
                        <i class="fa-solid fa-cart-shopping text-[20px]"></i>
                        <span class="cart-count">0</span>
                    </div>

                    <!-- CART DROPDOWN -->
                    <div id="cartDropdown"
                        class="absolute right-0 top-full mt-6 w-[420px] bg-white border border-[#ededed] shadow-lg p-8 z-50
                            opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300">
                    </div>
                </div>

                <div class="relative group hidden md:block">
                    <div class="cursor-pointer flex items-center gap-1">
                        <i class="fa-regular fa-heart text-[20px]"></i>
                        <span class="wishlist-count">0</span>
                    </div>

                    <!-- WISHLIST DROPDOWN -->
                    <div id="wishlistDropdown"
                        class="absolute right-0 top-full mt-6 w-[420px] bg-white border border-[#ededed] shadow-lg p-8 z-50
                            opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300">
                    </div>
                </div>
                <button type="button" data-drawer-target="mobile-menu-drawer" data-drawer-show="mobile-menu-drawer"
                    data-drawer-placement="right" aria-controls="mobile-menu-drawer"
                    class="lg:hidden text-black text-[22px]">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- Page title -->
    <section class="bg-[#f6f6f6] py-12">
        <div class="max-w-[1400px] mx-auto px-8">
            <h1 class="text-[18px] uppercase tracking-[0.18em]">Search Results</h1>
        </div>
    </section>

    <main class="max-w-[1400px] mx-auto px-8 py-20">

        <div class="max-w-[700px] mb-16">
            <label class="block mb-4 text-[12px] uppercase tracking-[0.28em] text-black">
                Search Products
            </label>

            <div class="relative">
                <input 
                    id="searchPageInput"
                    type="text"
                    class="w-full border-b border-black/20 bg-transparent outline-none py-4 pr-10 text-[18px] normal-case tracking-normal placeholder:text-[#8a8a8a]"
                    placeholder="Search by name, category, color, material...">

                <i class="fa-solid fa-magnifying-glass absolute right-0 top-1/2 -translate-y-1/2 text-[18px] text-black"></i>
            </div>
        </div>

        <p id="searchResultsText" class="mb-10 text-[14px] uppercase tracking-[0.18em] text-[#8a8a8a]">
            Search results
        </p>

        <div 
            id="searchPageResults"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16">
        </div>

    </main>

    <script src="../js/data.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/wishlist.js"></script>
    <script src="../js/search-page.js"></script>
</body>

</html>
