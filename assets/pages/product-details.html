<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind Output -->
    <link href="../css/output.css" rel="stylesheet">
</head>

<body class="m-0 font-[Poppins] text-[#211f1f]">

    <!-- HEADER -->
    <header>
        <nav class="row justify-between items-center p-7">
            <div class="row justify-between items-center gap-20">
                <div>
                    <a href="../../index.html">
                        <img src="../images/home-images/Ceramics01.png" alt="logo">
                    </a>
                </div>

                <div class="row justify-between gap-15 items-center hidden lg:flex">
                    <a href="../../index.html"
                        class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Home</a>
                    <a href="./about.html"
                        class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">About Us</a>
                    <a href="./ourStores.html"
                        class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Our Stores</a>
                    <a href="./shop.html"
                        class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Shop</a>
                    <a href="./blog.html"
                        class="uppercase tracking-widest text-[11px] hover:text-gray-500 transition">Blog</a>
                </div>
            </div>

            <div class="row justify-between gap-5 items-center">

                <!-- Search -->
                <div class="relative hidden md:block">
                    <button type="button" id="openSearchBtn"
                        class="text-black text-[20px] hover:text-[#e2b7a8] transition">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>

                    <div id="searchDropdown"
                        class="absolute right-0 top-full mt-6 w-[420px] bg-white border border-[#ededed] shadow-lg p-7 z-50 hidden">

                        <div class="relative">
                            <input id="globalSearchInput" type="text" placeholder="Search products..."
                                class="w-full border-b border-black/20 bg-transparent outline-none py-3 pr-8 text-[14px] tracking-normal placeholder:text-[#8a8a8a] normal-case">

                            <i
                                class="fa-solid fa-magnifying-glass absolute right-0 top-1/2 -translate-y-1/2 text-[15px] text-black"></i>
                        </div>

                        <div id="globalSearchResults" class="mt-6 max-h-[360px] overflow-y-auto space-y-5">
                        </div>
                    </div>
                </div>

                <!-- Wishlist -->
                <div class="relative group hidden md:block">
                    <div class="cursor-pointer flex items-center gap-1">
                        <i class="fa-regular fa-heart text-[20px]"></i>
                        <span class="wishlist-count">0</span>
                    </div>

                    <div id="wishlistDropdown"
                        class="absolute right-0 top-full mt-6 w-[420px] bg-white border border-[#ededed] shadow-lg p-8 z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300">
                    </div>
                </div>

                <!-- Cart -->
                <div class="relative group hidden md:block">
                    <div class="cursor-pointer flex items-center gap-1">
                        <i class="fa-solid fa-cart-shopping text-[20px]"></i>
                        <span class="cart-count">0</span>
                    </div>

                    <div id="cartDropdown"
                        class="absolute right-0 top-full mt-6 w-[420px] bg-white border border-[#ededed] shadow-lg p-8 z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300">
                    </div>
                </div>
                <div id="userProfileMenu"></div>
                <!-- Mobile Drawer Button -->
                <button type="button" data-drawer-target="mobile-menu-drawer" data-drawer-show="mobile-menu-drawer"
                    data-drawer-placement="right" aria-controls="mobile-menu-drawer"
                    class="lg:hidden text-black text-[22px]">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- PRODUCT DETAILS -->
    <main class="max-w-[1400px] mx-auto px-8 py-5">

        <!-- Product Not Found -->
        <section id="productNotFound"
            class="hidden min-h-[420px] flex flex-col justify-center items-center text-center">
            <h2 class="text-[32px] font-normal mb-10">
                Product not found.
            </h2>

            <a href="./shop.html"
                class="bg-[#ffe9e2] px-16 py-5 text-[12px] uppercase tracking-[0.35em] hover:bg-black hover:text-white transition">
                Return to shop
            </a>
        </section>

        <!-- Product Content -->
        <section id="productDetailsContent" class="hidden">

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-14 items-start">

                <!-- LEFT: PRODUCT IMAGES -->
                <div class="lg:col-span-2 flex flex-col md:flex-row gap-5">

                    <!-- Thumbnails -->
                    <div id="productThumbnails" class="hidden md:flex flex-col justify-between shrink-0 w-[150px] h-[620px]">
                    </div>

                    <!-- Main Image -->
                    <div id="mainImageBox" class="flex-1 h-[620px] bg-white flex items-center justify-center transition-colors duration-300">
                        <div class="w-[88%] h-[74%] bg-transparent flex items-center justify-center overflow-hidden">
                            <img
                                id="productImage"
                                src=""
                                alt=""
                                class="w-full h-full object-contain object-center scale-[1.28] cursor-pointer transition duration-300"
                            >
                        </div>
                    </div>

                </div>

                <!-- RIGHT: PRODUCT INFO -->
                <div class="lg:col-span-2 pt-2 lg:pt-4">

                    <p id="productCategory" class="text-[12px] uppercase tracking-[0.25em] text-[#8a8a8a] mb-5">
                    </p>

                    <h1 id="productName"
                        class="text-[34px] md:text-[46px] font-normal uppercase tracking-[0.12em] leading-tight">
                    </h1>

                    <p id="productPrice" class="mt-6 text-[21px] text-[#8a8a8a] normal-case tracking-normal">
                    </p>

                    <p id="productDescription"
                        class="mt-10 text-[16px] leading-8 text-[#8a8a8a] normal-case tracking-normal max-w-[620px]">
                    </p>

                    <!-- Quantity + Add To Cart -->
                    <div class="mt-10 flex flex-col sm:flex-row gap-6 items-start sm:items-center">

                        <div class="inline-flex items-center border border-[#e5e5e5] h-[64px]">
                            <button id="decreaseQuantityBtn"
                                class="px-6 h-full text-[18px] text-[#8a8a8a] hover:text-black transition">
                                -
                            </button>

                            <span id="productQuantity" class="px-5 h-full flex items-center text-[18px] text-[#8a8a8a]">
                                1
                            </span>

                            <button id="increaseQuantityBtn"
                                class="px-6 h-full text-[18px] text-[#8a8a8a] hover:text-black transition">
                                +
                            </button>
                        </div>

                        <button id="addDetailsToCartBtn"
                            class="h-[64px] bg-[#ffe9e2] px-14 text-[12px] uppercase tracking-[0.32em] hover:bg-black hover:text-white transition">
                            Add To Cart
                        </button>

                    </div>

                    <!-- Wishlist -->
                    <button id="addDetailsToWishlistBtn"
                        class="mt-8 flex items-center gap-4 text-[13px] uppercase tracking-[0.28em] hover:text-[#e2b7a8] transition">
                        <i class="fa-regular fa-heart text-[23px]"></i>
                        Add To Wishlist
                    </button>

                    <!-- Meta -->
                    <div
                        class="mt-12 border-t border-[#ededed] pt-8 space-y-4 text-[14px] text-[#8a8a8a] normal-case tracking-normal">
                        <p>
                            <span class="text-black">SKU:</span>
                            <span id="productSku"></span>
                        </p>

                        <p>
                            <span class="text-black">Category:</span>
                            <span id="productCategoryBottom"></span>
                        </p>

                        <p>
                            <span class="text-black">Color:</span>
                            <span id="productColor"></span>
                        </p>

                        <p>
                            <span class="text-black">Material:</span>
                            <span id="productMaterial"></span>
                        </p>

                        <p>
                            <span class="text-black">Availability:</span>
                            <span class="text-green-600">In stock</span>
                        </p>
                    </div>

                </div>

            </div>

            <!-- Related products -->
            <section class="mt-28">
                <h2 class="text-[32px] uppercase tracking-[0.12em] mb-12">
                    Related Products
                </h2>

                <div id="relatedProductsContainer"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16">
                </div>
            </section>

        </section>
    </main>

    <!-- MOBILE DRAWER MENU -->
    <div id="mobile-menu-drawer"
        class="fixed top-0 right-0 z-50 h-screen w-[320px] max-w-[85%] translate-x-full bg-white p-8 overflow-y-auto transition-transform border-l border-[#ededed] lg:hidden"
        tabindex="-1" aria-labelledby="mobile-menu-drawer-label">

        <div class="flex items-center justify-between border-b border-[#ededed] pb-6">
            <a href="../../index.html">
                <img src="../images/home-images/Ceramics01.png" alt="logo" class="w-[130px]">
            </a>

            <button type="button" data-drawer-hide="mobile-menu-drawer" aria-controls="mobile-menu-drawer"
                class="text-black text-[24px] hover:text-[#e2b7a8] transition">
                <i class="fa-solid fa-xmark"></i>
                <span class="sr-only">Close menu</span>
            </button>
        </div>

        <nav class="mt-10">
            <ul class="space-y-7">
                <li><a href="../../index.html"
                        class="block uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">Home</a>
                </li>
                <li><a href="./about.html"
                        class="block uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">About
                        Us</a></li>
                <li><a href="./ourStores.html"
                        class="block uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">Our
                        Stores</a></li>
                <li><a href="./shop.html"
                        class="block uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">Shop</a>
                </li>
                <li><a href="./blog.html"
                        class="block uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">Blog</a>
                </li>

                <li>
                    <a href="./cart.html"
                        class="flex items-center gap-3 uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">
                        <i class="fa-solid fa-cart-shopping"></i>
                        Cart
                        <span class="cart-count">0</span>
                    </a>
                </li>

                <li>
                    <a href="./wishlist.html"
                        class="flex items-center gap-3 uppercase tracking-[0.25em] text-[13px] hover:text-[#e2b7a8] transition">
                        <i class="fa-regular fa-heart"></i>
                        Wishlist
                        <span class="wishlist-count">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- PRODUCT IMAGE LIGHTBOX -->
    <div id="productLightbox" class="fixed inset-0 bg-black/70 z-[9999] hidden items-center justify-center px-5">

        <div class="relative max-w-[760px] w-full">

            <!-- Image -->
            <div class="bg-white w-full aspect-square flex items-center justify-center p-8">
                <img id="lightboxImage" src="" alt="" class="w-full h-full object-contain">
            </div>

            <!-- Close -->
            <button id="closeLightboxBtn"
                class="absolute -bottom-12 right-3 text-white text-[28px] hover:text-[#e2b7a8] transition">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <!-- Previous -->
            <button id="prevLightboxBtn"
                class="absolute -bottom-12 left-3 text-white text-[28px] hover:text-[#e2b7a8] transition">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <!-- Counter -->
            <div id="lightboxCounter"
                class="absolute -bottom-11 left-14 text-white text-[18px] font-semibold tracking-widest">
                1/1
            </div>

            <!-- Next -->
            <button id="nextLightboxBtn"
                class="absolute -bottom-12 left-28 text-white text-[28px] hover:text-[#e2b7a8] transition">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/wishlist.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/product-details.js"></script>
    <script src="../js/user-profile-menu.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
</body>

</html>
